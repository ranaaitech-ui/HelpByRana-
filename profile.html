<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Profile — Help By Rana</title>
  <meta name="description" content="View worker profile, ratings, skills, and contact info on Help By Rana.">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    /* Star rating input */
    .star-input {
      display: flex;
      flex-direction: row-reverse;
      justify-content: flex-end;
      gap: .2rem;
    }

    .star-input input {
      display: none;
    }

    .star-input label {
      font-size: 2rem;
      color: var(--surface-2);
      cursor: pointer;
      transition: color .15s;
      line-height: 1;
    }

    .star-input label:hover,
    .star-input label:hover~label,
    .star-input input:checked~label {
      color: var(--accent);
    }

    .review-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
    }

    .review-form h3 {
      margin-bottom: 1.5rem;
      padding-bottom: .75rem;
      border-bottom: 1px solid var(--border);
    }

    .review-form input,
    .review-form textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: .65rem 1rem;
      font-family: inherit;
      font-size: .9rem;
      outline: none;
      transition: var(--transition);
      width: 100%;
    }

    .review-form input:focus,
    .review-form textarea:focus {
      border-color: var(--primary);
    }

    .review-form textarea {
      resize: vertical;
      min-height: 90px;
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo"><span class="logo-icon">🔧</span> Help By <span>Rana</span></a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="workers.html">Find Workers</a>
        <a href="register.html">Join as Worker</a>
      </div>
      <div class="nav-cta">
        <a href="workers.html" class="btn btn-secondary btn-sm">← All Workers</a>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>

  <div class="container section" id="profile-root">
    <div class="text-center" style="padding:4rem 0;">
      <div style="font-size:2.5rem;">⏳</div>
      <p class="mt-2">Loading profile...</p>
    </div>
  </div>

  <footer class="footer">
    <div class="container footer-bottom">
      <p>© 2026 Help By Rana.</p>
      <a href="workers.html" class="btn btn-sm btn-secondary">← Back to Workers</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('open');
    });

    const params = new URLSearchParams(location.search);
    const id = parseInt(params.get('id'));
    const root = document.getElementById('profile-root');

    async function init() {
      try {
        const workers = await db.getWorkers();
        const worker = workers.find(w => w.id === id);

        if (!worker) {
          root.innerHTML = `
        <div class="empty-state">
          <div class="icon">😕</div>
          <h3>Worker not found</h3>
          <p>This profile does not exist or may have been removed.</p>
          <a href="workers.html" class="btn btn-primary mt-3">Browse Workers</a>
        </div>`;
          return;
        }

        document.title = `${worker.name} — Help By Rana`;

        // Load user reviews from localStorage
        function getUserReviews() { return db.getWorkerReviews(id); }

        // Compute live rating (merge built-in reviews count with live ones)
        function getLiveRating() {
          const reviews = getUserReviews();
          if (reviews.length === 0) return { avg: worker.rating, count: worker.reviews };
          const allRatings = reviews.map(r => r.rating);
          // merge with original built-in reviews (count only, avg weighted)
          const totalCount = worker.reviews + reviews.length;
          const totalSum = worker.rating * worker.reviews + allRatings.reduce((a, b) => a + b, 0);
          return { avg: (totalSum / totalCount).toFixed(1), count: totalCount };
        }

        function renderStarsDisplay(n) {
          return [1, 2, 3, 4, 5].map(i => `<span style="color:${i <= Math.round(n) ? 'var(--accent)' : 'var(--surface-2)'}; font-size: 1.1rem;">★</span>`).join('');
        }

        function renderReviewsSection() {
          const userReviews = getUserReviews();
          const { avg, count } = getLiveRating();

          // Rating bars
          const bars = [5, 4, 3, 2, 1].map(n => {
            const cntN = userReviews.filter(r => r.rating === n).length;
            const pct = userReviews.length ? Math.round(cntN / userReviews.length * 100) : (n === 5 ? 80 : n === 4 ? 15 : n === 3 ? 4 : 0);
            return `
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.4rem;">
          <span style="width:18px;font-size:.8rem;color:var(--text-dim);">${n}</span>
          <div style="flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:3px;transition:.3s;"></div>
          </div>
          <span style="width:30px;font-size:.78rem;color:var(--text-dim);text-align:right;">${pct}%</span>
        </div>`;
          }).join('');

          // User review items
          const reviewItems = userReviews.length > 0
            ? userReviews.map(r => `
          <div style="padding:1.25rem 0;border-bottom:1px solid var(--border);">
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;">
              <div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;">
                ${r.name ? r.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : '👤'}
              </div>
              <div>
                <div style="font-weight:600;font-size:.9rem;">${r.name || 'Anonymous'}</div>
                <div style="font-size:.75rem;color:var(--text-dim);">
                  ${'⭐'.repeat(r.rating)} • ${new Date(r.date).toLocaleDateString('en-PK', { day: 'numeric', month: 'short', year: 'numeric' })}
                </div>
              </div>
            </div>
            ${r.comment ? `<p style="font-size:.875rem;color:var(--text-muted);">"${r.comment}"</p>` : ''}
          </div>`).join('')
            : `<div style="padding:1.5rem 0;text-align:center;color:var(--text-dim);font-size:.9rem;">
           No reviews yet. Be the first to rate this worker! 👇
         </div>`;

          return `
      <div style="display:flex;gap:3rem;align-items:flex-start;flex-wrap:wrap;margin-bottom:1.5rem;">
        <div style="text-align:center;">
          <div style="font-size:3.5rem;font-weight:900;color:var(--accent);">${avg}</div>
          <div style="font-size:1.3rem;margin:.2rem 0;">${'⭐'.repeat(Math.round(avg))}</div>
          <div style="font-size:.8rem;color:var(--text-dim);">${count} review${count !== 1 ? 's' : ''}</div>
        </div>
        <div style="flex:1;min-width:180px;">${bars}</div>
      </div>
      <div id="review-items">${reviewItems}</div>`;
        }

        function buildPage() {
          const { avg, count } = getLiveRating();
          root.innerHTML = `
      <div class="profile-layout">
        <!-- Sidebar -->
        <aside class="profile-sidebar">
          <img src="${worker.photo}" alt="${worker.name}" class="profile-photo">
          <h2 class="profile-name">${worker.name} ${worker.verified ? '<i class="bx bxs-badge-check" style="color:var(--secondary);"></i>' : ''}</h2>
          <p class="profile-service">${worker.category}</p>
          ${worker.verified ? '<span class="badge badge-verified">✓ Verified Professional</span>' : ''}
          <div class="profile-stat-row">
            <div class="profile-stat"><span class="val accent">⭐ ${avg}</span><span class="lbl">Rating</span></div>
            <div class="profile-stat"><span class="val">${count}</span><span class="lbl">Reviews</span></div>
            <div class="profile-stat"><span class="val">${worker.experience}</span><span class="lbl">Yrs Exp</span></div>
          </div>
          <div class="profile-actions">
            ${worker.paymentStatus === 'verified' ? `
                <a href="tel:${worker.phone}" class="btn btn-primary w-full"><i class='bx bx-phone'></i> Call Now</a>
                <a href="https://wa.me/${worker.whatsapp}" target="_blank" class="btn btn-green w-full"><i class='bx bxl-whatsapp'></i> WhatsApp</a>
            ` : worker.paymentStatus === 'pending' ? `
                <button class="btn btn-secondary w-full" disabled><i class='bx bx-time'></i> Payment Verification Pending</button>
            ` : `
                <a href="payment.html?id=${worker.id}" class="btn btn-secondary w-full" style="background: var(--surface-2); color: var(--text-primary);"><i class='bx bx-lock-alt'></i> Pay Commission to Unlock Contact</a>
            `}
          </div>
          <div class="divider mt-3 mb-3"></div>
          <div style="font-size:.85rem;color:var(--text-muted);">
            <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
              <span>Status</span>
              <span style="font-weight:600;color:${worker.available ? 'var(--secondary)' : 'var(--text-dim)'};">
                <span class="avail-dot ${worker.available ? '' : 'offline'}"></span>${worker.available ? 'Available' : 'Busy'}
              </span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
              <span>Price</span><span style="font-weight:600;color:var(--accent);">${worker.price}</span>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span>Location</span><span style="font-weight:500;">${worker.city}</span>
            </div>
          </div>
        </aside>

        <!-- Main -->
        <div class="profile-main">
          <!-- About -->
          <div class="profile-section">
            <h3>About ${worker.name}</h3>
            <p>${worker.description}</p>
            <div class="meta-list mt-3">
              <div class="meta-row"><span class="icon">📍</span><span class="label">Location</span><span class="value">${worker.area || ''}, ${worker.city || ''}</span></div>
              <div class="meta-row"><span class="icon">📞</span><span class="label">Phone</span>
                  <span class="value">
                      ${worker.paymentStatus === 'verified' ? `<a href="tel:${worker.phone}" style="color:var(--primary-light);">${worker.phone}</a>` : `<span style="color: var(--text-dim);"><i class='bx bx-lock-alt'></i> Hidden (Unlock via Payment)</span>`}
                  </span>
              </div>
              <div class="meta-row"><span class="icon">💼</span><span class="label">Experience</span><span class="value">${worker.experience} Years</span></div>
              <div class="meta-row"><span class="icon">💰</span><span class="label">Pricing</span><span class="value">${worker.price}</span></div>
            </div>
          </div>

          <!-- Skills -->
          <div class="profile-section">
            <h3>Skills & Expertise</h3>
            <div class="skill-tags mt-2">
              ${(worker.skills || [worker.category]).map(s => `<span class="skill-tag">${s}</span>`).join('')}
            </div>
          </div>

          <!-- Ratings & Reviews -->
          <div class="profile-section" id="ratings-section">
            <h3>Ratings & Reviews</h3>
            <div id="ratings-body">${renderReviewsSection()}</div>
          </div>

          <!-- ⭐ Rate this Worker -->
          <div class="review-form" id="rate-form-box">
            <h3>⭐ Rate This Worker</h3>
            <p class="text-muted mb-3" style="font-size:.9rem;">Worked with ${worker.name}? Share your experience to help others.</p>
            <form id="rate-form">
              <!-- Star selector -->
              <div style="margin-bottom:1.25rem;">
                <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:.6rem;">Your Rating *</label>
                <div class="star-input">
                  <input type="radio" name="rating" id="s5" value="5"><label for="s5" title="5 stars">★</label>
                  <input type="radio" name="rating" id="s4" value="4"><label for="s4" title="4 stars">★</label>
                  <input type="radio" name="rating" id="s3" value="3"><label for="s3" title="3 stars">★</label>
                  <input type="radio" name="rating" id="s2" value="2"><label for="s2" title="2 stars">★</label>
                  <input type="radio" name="rating" id="s1" value="1"><label for="s1" title="1 star">★</label>
                </div>
                <div id="star-label" style="font-size:.82rem;color:var(--text-dim);margin-top:.4rem;">Click a star to rate</div>
              </div>
              <!-- Name -->
              <div style="margin-bottom:1rem;">
                <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:.4rem;">Your Name *</label>
                <input type="text" id="rev-name" required placeholder="e.g. Ahmed Ali">
              </div>
              <!-- Comment -->
              <div style="margin-bottom:1.25rem;">
                <label style="font-size:.82rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:.4rem;">Your Review (optional)</label>
                <textarea id="rev-comment" placeholder="Share how your experience was with this worker..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary"><i class='bx bx-send'></i> Submit Review</button>
            </form>
            <!-- Success message (hidden) -->
            <div id="rate-success" style="display:none; background:rgba(16,185,129,.08); border:1px solid rgba(16,185,129,.25); border-radius:var(--radius-md); padding:1.25rem; text-align:center; margin-top:1rem;">
              🎉 <strong>Thank you!</strong> Your review has been submitted successfully.
            </div>
          </div>

          <!-- Similar Workers -->
          <div class="profile-section">
            <h3>More ${worker.category} Workers</h3>
            <div class="grid-2 mt-2" id="similar-grid"></div>
          </div>
        </div>
      </div>`;

          // Star label update
          document.querySelectorAll('.star-input input').forEach(inp => {
            inp.addEventListener('change', () => {
              const labels = ['', 'Poor 😞', 'Fair 😐', 'Good 🙂', 'Very Good 😊', 'Excellent! 🤩'];
              document.getElementById('star-label').textContent = labels[inp.value] || '';
              document.getElementById('star-label').style.color = 'var(--accent)';
            });
          });

          // Review form submit
          document.getElementById('rate-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const ratingEl = document.querySelector('.star-input input:checked');
            if (!ratingEl) { alert('Please select a star rating.'); return; }
            const rating = parseInt(ratingEl.value);
            const name = document.getElementById('rev-name').value.trim();
            const comment = document.getElementById('rev-comment').value.trim();

            db.submitReview(id, { rating, name, comment });

            // Show success, hide form inputs
            document.getElementById('rate-form').style.display = 'none';
            document.getElementById('rate-success').style.display = 'block';

            // Refresh the reviews section
            document.getElementById('ratings-body').innerHTML = renderReviewsSection();
          });

          // Similar workers
          const similar = workers.filter(w => w.category === worker.category && w.id !== id).slice(0, 2);
          document.getElementById('similar-grid').innerHTML = similar.map(w => `
        <a href="profile.html?id=${w.id}" class="card" style="display:flex;align-items:center;gap:1rem;">
          <img src="${w.photo}" style="width:48px;height:48px;border-radius:50%;flex-shrink:0;object-fit:cover;">
          <div>
            <div style="font-weight:600;">${w.name}</div>
            <div style="font-size:.8rem;color:var(--primary-light);">${w.city} • ⭐ ${w.rating}</div>
          </div>
        </a>`).join('') || '<p class="text-dim" style="font-size:.9rem;">No other workers in this category yet.</p>';
        }

        buildPage();
      } catch (err) {
        root.innerHTML = `<div style="text-align:center;color:red;padding:2rem;">Failed to load profile. Connection error.</div>`;
      }
    }

    init();
  </script>
</body>

</html>
