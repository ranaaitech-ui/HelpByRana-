<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile — Help By Rana</title>
    <meta name="description"
        content="View full worker profile, ratings, skills, contact info, and reviews on Help By Rana.">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="container nav-inner">
            <a href="index.html" class="logo"><span class="logo-icon">🔧</span> Help By <span>Rana</span></a>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="workers.html">Find Workers</a>
                <a href="register.html">Join as Worker</a>
            </div>
            <div class="nav-cta">
                <a href="workers.html" class="btn btn-secondary btn-sm">← All Workers</a>
                <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="container section" id="profile-root">
        <!-- Loading state -->
        <div id="loading" class="text-center" style="padding:4rem 0;">
            <div style="font-size:2.5rem;margin-bottom:1rem;">⏳</div>
            <p>Loading profile...</p>
        </div>
    </div>

    <!-- Footer minimal -->
    <footer class="footer">
        <div class="container footer-bottom">
            <p>© 2026 Help By Rana.</p>
            <a href="workers.html" class="btn btn-sm btn-secondary">← Back to Workers</a>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script>
        document.getElementById('hamburger').addEventListener('click', () => {
            document.getElementById('nav-links').classList.toggle('open');
        });

        const params = new URLSearchParams(location.search);
        const id = parseInt(params.get('id'));
        const worker = db.getWorkers().find(w => w.id === id);

        const root = document.getElementById('profile-root');

        if (!worker) {
            root.innerHTML = `
    <div class="empty-state">
      <div class="icon">😕</div>
      <h3>Worker not found</h3>
      <p>The profile you are looking for does not exist.</p>
      <a href="workers.html" class="btn btn-primary mt-3">Browse Workers</a>
    </div>`;
        } else {
            document.title = `${worker.name} — Help By Rana`;
            const ratingBars = [5, 4, 3, 2, 1].map(n => {
                const w = n === 5 ? 80 : n === 4 ? 15 : n === 3 ? 4 : n === 2 ? 1 : 0;
                return `
      <div class="rating-bar-row" style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;">
        <span style="width:20px;font-size:.8rem;color:var(--text-dim);">${n}★</span>
        <div class="bar-track" style="flex:1;height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden;">
          <div style="height:100%;width:${w}%;background:var(--accent);border-radius:3px;"></div>
        </div>
        <span style="width:30px;font-size:.78rem;color:var(--text-dim);text-align:right;">${w}%</span>
      </div>`;
            }).join('');

            const dummyReviews = [
                { name: "Arif Mehmood", avatar: "AM", text: `${worker.name} did excellent work! Very professional and on time. Highly recommend.`, rating: 5, date: "2 weeks ago" },
                { name: "Fatima Siddiqui", avatar: "FS", text: "Great service at a fair price. Will definitely hire again.", rating: 4, date: "1 month ago" },
                { name: "Tahir Hussain", avatar: "TH", text: "Came quickly and fixed the issue. Very cooperative and skilled.", rating: 5, date: "6 weeks ago" },
            ];

            root.innerHTML = `
    <div class="profile-layout">
      <!-- Sidebar -->
      <aside class="profile-sidebar">
        <img src="${worker.photo}" alt="${worker.name}" class="profile-photo">
        <h2 class="profile-name">${worker.name} ${worker.verified ? '<i class="bx bxs-badge-check" style="color:var(--secondary);font-size:1rem;"></i>' : ''}</h2>
        <p class="profile-service">${worker.category}</p>
        ${worker.verified ? '<span class="badge badge-verified">✓ Verified Professional</span>' : ''}
        <div class="profile-stat-row">
          <div class="profile-stat"><span class="val accent">⭐ ${worker.rating}</span><span class="lbl">Rating</span></div>
          <div class="profile-stat"><span class="val">${worker.reviews}</span><span class="lbl">Reviews</span></div>
          <div class="profile-stat"><span class="val">${worker.experience}</span><span class="lbl">Yrs Exp</span></div>
        </div>
        <div class="profile-actions">
          <a href="tel:${worker.phone}" class="btn btn-primary w-full"><i class='bx bx-phone'></i> Call Now</a>
          <a href="https://wa.me/${worker.whatsapp}" target="_blank" class="btn btn-green w-full"><i class='bx bxl-whatsapp'></i> WhatsApp</a>
        </div>
        <div class="divider mt-3 mb-3"></div>
        <div style="font-size:.85rem;color:var(--text-muted);">
          <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
            <span>Status</span>
            <span style="font-weight:600;color:${worker.available ? 'var(--secondary)' : 'var(--text-dim)'};">
              <span class="avail-dot ${worker.available ? '' : 'offline'}"></span>
              ${worker.available ? 'Available Now' : 'Currently Busy'}
            </span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:.4rem;">
            <span>Price</span>
            <span style="font-weight:600;color:var(--accent);">${worker.price}</span>
          </div>
          <div style="display:flex;justify-content:space-between;">
            <span>Location</span>
            <span style="font-weight:500;">${worker.city}</span>
          </div>
        </div>
      </aside>
      <!-- Main -->
      <div class="profile-main">
        <!-- About -->
        <div class="profile-section">
          <h3>About ${worker.name}</h3>
          <p>${worker.description}</p>
          <div class="meta-list mt-3">
            <div class="meta-row"><span class="icon">📍</span><span class="label">Location</span><span class="value">${worker.area}, ${worker.city}</span></div>
            <div class="meta-row"><span class="icon">📞</span><span class="label">Phone</span><span class="value"><a href="tel:${worker.phone}" style="color:var(--primary-light);">${worker.phone}</a></span></div>
            <div class="meta-row"><span class="icon">💼</span><span class="label">Experience</span><span class="value">${worker.experience} Years</span></div>
            <div class="meta-row"><span class="icon">💰</span><span class="label">Pricing</span><span class="value">${worker.price}</span></div>
          </div>
        </div>
        <!-- Skills -->
        <div class="profile-section">
          <h3>Skills & Expertise</h3>
          <div class="skill-tags">
            ${(worker.skills || [worker.category]).map(s => `<span class="skill-tag">${s}</span>`).join('')}
          </div>
        </div>
        <!-- Ratings -->
        <div class="profile-section">
          <h3>Ratings & Reviews</h3>
          <div style="display:flex;gap:3rem;align-items:flex-start;flex-wrap:wrap;">
            <div style="text-align:center;">
              <div style="font-size:3.5rem;font-weight:900;color:var(--accent);">${worker.rating}</div>
              <div style="font-size:1.2rem;margin:.25rem 0;">${'⭐'.repeat(Math.round(worker.rating))}</div>
              <div style="font-size:.8rem;color:var(--text-dim);">${worker.reviews} total reviews</div>
            </div>
            <div style="flex:1;min-width:200px;">${ratingBars}</div>
          </div>
          <div class="divider mt-3 mb-3"></div>
          ${dummyReviews.map(r => `
            <div class="review-item">
              <div class="review-item-head">
                <div class="reviewer-avatar">${r.avatar}</div>
                <div>
                  <div style="font-weight:600;font-size:.9rem;">${r.name}</div>
                  <div style="font-size:.78rem;color:var(--text-dim);">${r.date} • ${'⭐'.repeat(r.rating)}</div>
                </div>
              </div>
              <p style="font-size:.875rem;color:var(--text-muted);">"${r.text}"</p>
            </div>`).join('')}
        </div>
        <!-- Similar Workers -->
        <div class="profile-section">
          <h3>More ${worker.category} Workers</h3>
          <div class="grid-2 mt-2" id="similar-grid"></div>
        </div>
      </div>
    </div>`;

            document.getElementById('loading').style.display = 'none';

            // Similar workers
            const similar = db.getWorkers().filter(w => w.category === worker.category && w.id !== worker.id).slice(0, 2);
            document.getElementById('similar-grid').innerHTML = similar.map(w => `
    <a href="profile.html?id=${w.id}" class="card" style="display:flex;align-items:center;gap:1rem;text-decoration:none;">
      <img src="${w.photo}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;">
      <div>
        <div style="font-weight:600;">${w.name}</div>
        <div style="font-size:.8rem;color:var(--primary-light);">${w.city} • ⭐ ${w.rating}</div>
        <div style="font-size:.78rem;color:var(--text-dim);">${w.experience} yrs exp</div>
      </div>
    </a>`).join('') || '<p class="text-dim">No other workers in this category yet.</p>';
        }
    </script>
</body>

</html>
